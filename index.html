
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A web-based application for writers to create, manage, and write their novels. All your work is saved locally in a project file on your computer." />
    <meta name="theme-color" content="#5D4C40">
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <title>StoryVerse</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Times New Roman"', 'Times', 'serif'],
                        serif: ['"Times New Roman"', 'Times', 'serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
      .story-content p {
        text-indent: 2em;
        margin-bottom: 1em;
      }
      .story-content h1,
      .story-content h2,
      .story-content h3 {
        text-indent: 0;
        font-weight: bold;
        line-height: 1.3;
        margin-bottom: 1em;
        text-align: center;
      }
      .story-content h1 { font-size: 3em; margin-top: 2em; }
      .story-content h2 { font-size: 2.5em; margin-top: 1.5em; }
      .story-content h3 { font-size: 2em; margin-top: 1.5em; }
      .story-content h1 + p,
      .story-content h2 + p,
      .story-content h3 + p { text-indent: 0; }
      .story-content blockquote {
        border-left: 3px solid;
        border-color: currentColor;
        opacity: 0.8;
        margin: 1.5em 0;
        padding-left: 1.5em;
        font-style: italic;
      }
      .story-content blockquote p { text-indent: 0; }
      .story-content ul, .story-content ol { margin-left: 2.5em; margin-bottom: 1em; text-indent: 0; }
      .story-content ul { list-style-type: disc; }
      .story-content ol { list-style-type: decimal; }
      .story-content li { margin-bottom: 0.5em; }
      .story-content li p { text-indent: 0; margin-bottom: 0.5em; }
      .search-highlight {
        background-color: rgba(255, 220, 0, 0.5);
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(255, 220, 0, 0.7);
      }
      .current-match {
        background-color: rgba(255, 165, 0, 0.7);
        box-shadow: 0 0 0 2px rgba(255, 165, 0, 1);
      }
    </style>

  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.3",
    "idb-keyval": "https://aistudiocdn.com/idb-keyval@^6.2.2",
    "mammoth": "https://aistudiocdn.com/mammoth@^1.11.0",
    "pdfjs-dist": "https://aistudiocdn.com/pdfjs-dist@4.0.379/build/pdf.min.mjs",
    "pdfjs-dist/build/pdf.worker.min.mjs": "https://aistudiocdn.com/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs",
    "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js",
    "firebase/": "https://esm.sh/firebase@^12.9.0/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <noscript>
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background-color: #5D4C40; color: #F5EADD;">
        <h1>JavaScript is required to run StoryVerse</h1>
        <p>Please enable JavaScript in your browser settings to continue.</p>
      </div>
    </noscript>
  </body>
</html>
